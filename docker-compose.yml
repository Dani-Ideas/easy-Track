services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: faciltrack
      MYSQL_USER: faciltrack
      MYSQL_PASSWORD: faciltrack
      MYSQL_DATABASE: faciltrack
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
